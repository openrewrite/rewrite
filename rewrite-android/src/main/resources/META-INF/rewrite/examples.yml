---
type: specs.openrewrite.org/v1beta/example
recipeName: org.openrewrite.android.UpgradeAndroidGradlePluginVersion
examples:
- description: '`UpgradeAndroidGradlePluginVersionTest#groovyPluginsBlockIdVersion`'
  parameters:
  - 8.5.0
  - 'null'
  sources:
  - before: |
      plugins {
          id 'com.android.application' version '8.0.0'
      }
    after: |
      plugins {
          id 'com.android.application' version '8.5.0'
      }
    path: build.gradle
    language: groovy
---
type: specs.openrewrite.org/v1beta/example
recipeName: org.openrewrite.android.UpgradeCompileSdkVersion
examples:
- description: '`UpgradeCompileSdkVersionTest#groovyLiteralInt`'
  parameters:
  - '35'
  sources:
  - before: |
      plugins {
          id 'com.android.application'
      }

      android {
          compileSdk 34
      }
    after: |
      plugins {
          id 'com.android.application'
      }

      android {
          compileSdk 35
      }
    path: build.gradle
    language: groovy
---
type: specs.openrewrite.org/v1beta/example
recipeName: org.openrewrite.android.UpgradeMinSdkVersion
examples:
- description: '`UpgradeMinSdkVersionTest#groovyLiteralIntAssignment`'
  parameters:
  - '24'
  sources:
  - before: |
      android {
          defaultConfig {
              minSdk = 21
          }
      }
    after: |
      android {
          defaultConfig {
              minSdk = 24
          }
      }
    path: build.gradle
    language: groovy
---
type: specs.openrewrite.org/v1beta/example
