---
name: npm-publish

on:
  workflow_call:
    inputs:
      java_version:
        description: Java version for setup-java
        type: string
        required: false
        default: 21
      releasing:
        description: Whether this is a release publish (uses tag version and latest npm tag)
        type: boolean
        required: false
        default: false
      npm_version:
        description: Exact npm package version to publish (passed from build/release job)
        type: string
        required: false
        default: ''
    secrets:
      gradle_enterprise_access_key:
        required: false
      npm_token:
        required: false
  workflow_dispatch:
    inputs:
      java_version:
        description: Java version for setup-java
        type: string
        required: false
        default: 21

permissions:
  contents: read
  id-token: write

env:
  GRADLE_SWITCHES: --console=plain --info --stacktrace --warning-mode=all --no-daemon

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' &&
      (github.repository_owner == 'openrewrite' || github.repository_owner == 'moderneinc')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'

      - uses: gradle/actions/setup-gradle@v5
        with:
          develocity-access-key: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}

      - name: npm pack
        run: >
          ./gradlew ${{ env.GRADLE_SWITCHES }}
          :rewrite-javascript:npmPack
          ${{ inputs.releasing && '-Preleasing' || '' }}
          ${{ inputs.npm_version && format('-PnpmVersion={0}', inputs.npm_version) || '' }}

      - name: npm publish
        run: |
          TARBALL=$(ls rewrite-javascript/build/distributions/*.tgz)
          npm publish "$TARBALL" --provenance --access public ${{ inputs.releasing && ' ' || '--tag next' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token || secrets.NPM_TOKEN }}
