---
name: npm-publish

# Publishes only after `ci` succeeds for a push to main or `publish` succeeds
# for a version tag. `ci` also runs for PRs, schedules, and manual dispatches;
# those must not publish to npm.
on:
  workflow_run:
    workflows:
      - ci
      - publish
    types:
      - completed

concurrency:
  group: npm-publish-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (
        (
          github.event.workflow_run.name == 'ci' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        ) ||
        (
          github.event.workflow_run.name == 'publish' &&
          github.event.workflow_run.event == 'push'
        )
      ) &&
      (github.repository_owner == 'openrewrite' || github.repository_owner == 'moderneinc')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            25
            21

      - uses: gradle/actions/setup-gradle@v5
        with:
          develocity-access-key: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}

      # Trusted Publisher auto-detection in `npm publish` requires npm >= 11.5.1.
      # GitHub-hosted ubuntu runners currently ship Node 22 / npm 10.x, and the
      # global install needs sudo to write under /usr/local.
      - shell: bash
        run: sudo npm install -g npm@latest

      # For a tag-triggered upstream `publish` run, `head_branch` is the tag name
      # (e.g. `v8.83.0`). Strip the leading `v` and publish to dist-tag `latest`.
      # Otherwise this is the `ci`-triggered snapshot path: let Gradle derive the
      # dated snapshot version and publish to dist-tag `next`.
      - id: ver
        shell: bash
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [[ '${{ github.event.workflow_run.name }}' == 'publish' ]]; then
            echo "version=${TAG#v}"   >> "$GITHUB_OUTPUT"
            echo "dist_tag=latest"    >> "$GITHUB_OUTPUT"
          else
            echo "version="           >> "$GITHUB_OUTPUT"
            echo "dist_tag=next"      >> "$GITHUB_OUTPUT"
          fi

      - shell: bash
        run: |
          ARGS=()
          if [[ -n '${{ steps.ver.outputs.version }}' ]]; then
            ARGS+=("-PnpmPublishVersion=${{ steps.ver.outputs.version }}")
          fi
          ./gradlew --no-daemon --console=plain --info --stacktrace \
            :rewrite-javascript:npmPack "${ARGS[@]}"

      # npm has no `--skip-duplicate`. The daily scheduled snapshot publish would
      # otherwise 403 whenever no new commit had landed since the previous run
      # (the snapshot version is derived from the latest commit timestamp).
      - shell: bash
        env:
          CI: 'true'
          DIST_TAG: ${{ steps.ver.outputs.dist_tag }}
        run: |
          TGZ=$(ls rewrite-javascript/build/distributions/openrewrite-rewrite-*.tgz)
          V=$(tar -xzOf "$TGZ" package/package.json | python3 -c 'import json,sys;print(json.load(sys.stdin)["version"])')
          echo "Tarball: $TGZ"
          echo "Version: $V"
          echo "Dist-tag: $DIST_TAG"
          if npm view "@openrewrite/rewrite@$V" version >/dev/null 2>&1; then
            echo "Skipping npm publish: @openrewrite/rewrite@$V already published"
            exit 0
          fi
          npm publish "$TGZ" --tag "$DIST_TAG"
