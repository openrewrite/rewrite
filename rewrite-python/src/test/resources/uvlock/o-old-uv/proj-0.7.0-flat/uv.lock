version = 1
revision = 2
requires-python = ">=3.12"

[[package]]
name = "fixture-o-flat"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "iniconfig" },
    { name = "six" },
]

[package.metadata]
requires-dist = [
    { name = "iniconfig", specifier = ">=2.0" },
    { name = "six", specifier = ">=1.16" },
]

[[package]]
name = "iniconfig"
version = "2.3.0"
source = { registry = "assets/shared" }
wheels = [
    { path = "iniconfig-2.3.0-py3-none-any.whl" },
]

[[package]]
name = "six"
version = "1.17.0"
source = { registry = "assets/shared" }
wheels = [
    { path = "six-1.17.0-py2.py3-none-any.whl" },
]
