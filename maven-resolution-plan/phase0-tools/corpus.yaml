# Phase-0 parity corpus manifest (PHASE-0-SPEC.md section 3).
#
# Committed: this manifest only. Materialized state (.corpus/: poms, reactor clones, HTTP store,
# ground truth, snapshots) is cached, never committed; CI caches key on the hash of this file.
# Entry kinds: pom (single Central artifact) | reactor (git clone at pinned tag).
# groundTruth flavors: dependency-tree (mvn dependency:tree -Dverbose), effective-pom
# (mvn help:effective-pom). For pom entries the tree is captured through a generated consumer
# stub declaring the GAV as sole dependency; effective-pom runs against the artifact's own pom.
# deferred: true = not exercisable against Central (SNAPSHOTs) — slice-C synthetic corpus.
# fetchOnly: true = materialized but excluded from record/ground-truth/resolution in phase 0.

entries:
  # --- Single-pom Central entries, chosen for feature coverage ---
